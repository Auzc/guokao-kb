site_name: 2026国考知识库
site_description: 国家公务员考试备考知识库 — 行测·申论·真题·模考
site_url: https://guokao-kb.pages.dev
repo_url: https://github.com/Auzc/guokao-kb
repo_name: guokao-kb
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  font:
    text: Noto Serif SC
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - toc.follow
    - content.tooltips
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.tracking
    - navigation.prune
    - search.share
  icon:
    repo: fontawesome/brands/github
  custom_dir: overrides
  favicon: assets/images/favicon.png
  logo: assets/images/favicon.png

plugins:
  - search:
      separator: '[\s\-\.\u4e00-\u9fff]+'
      lang:
        - zh
        - en
  - tags
  - glightbox
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - tags
        - categories

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: false
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Auzc/guokao-kb
  generator: false
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  homepage: https://auzc.github.io/guokao-kb/

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js

nav:
  - 首页: index.md
  - 知识库:
    - kb/xingce/index.md
    - 资料分析:
      - kb/xingce/ziliao/index.md
      - 速算技巧: kb/xingce/ziliao/suansuan.md
      - 公式体系: kb/xingce/ziliao/gongshi.md
      - 真题精讲: kb/xingce/ziliao/zhenti.md
    - 判断推理:
      - kb/xingce/panduan/index.md
      - 图形推理: kb/xingce/panduan/tuxing.md
      - 逻辑判断: kb/xingce/panduan/luoji.md
      - 类比推理: kb/xingce/panduan/leibi.md
      - 定义判断: kb/xingce/panduan/dingyi.md
    - 言语理解:
      - kb/xingce/yanyu/index.md
      - 逻辑填空: kb/xingce/yanyu/tiankong.md
      - 片段阅读: kb/xingce/yanyu/pianduan.md
    - 数量关系:
      - kb/xingce/shuliang/index.md
      - 工程问题: kb/xingce/shuliang/gongcheng.md
      - 排列组合: kb/xingce/shuliang/pailie.md
    - 常识判断:
      - kb/xingce/changshi/index.md
      - 时政积累: kb/xingce/changshi/shizheng.md
    - 申论:
      - kb/shenlun/index.md
      - 归纳概括: kb/shenlun/guina/index.md
      - 综合分析: kb/shenlun/zonghe/index.md
      - 提出对策: kb/shenlun/tichu/index.md
      - 贯彻执行: kb/shenlun/guanche/index.md
      - 大作文: kb/shenlun/dazuowen/index.md
    - 真题库: kb/zhenti/index.md
    - 模考记录: kb/mokao/index.md
  - 博客:
    - blog/index.md
    - blog/posts/2026-06-23-day1.md
    - blog/posts/2026-06-24-day2.md
  - 备考规划:
    - overview.md
    - timeline.md
    - resources.md
  - 样本与研究:
    - research/index.md
    - 主流通用路径图: research/pathway.md
  - 迭代日志: changelog.md

