{% extends "base.html" %}

{% block tabs %}
  {{ super() }}
  {% if page.is_home %}
    <style>
      .md-sidebar--primary { display: none; }
      .md-sidebar--secondary { display: none; }
      .md-content { max-width: 100%; margin: 0; padding: 0; }
      .md-main { min-height: auto; }

      .home-hero {
        text-align: center;
        padding: 3rem 1.5rem;
        background: linear-gradient(135deg, #1a237e 0%, #1565c0 100%);
        color: white;
        border-radius: 0 0 16px 16px;
        margin-bottom: 1.5rem;
      }
      .home-hero h1 {
        color: white;
        border-bottom: none;
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .home-tagline {
        font-size: 1rem;
        opacity: 0.8;
        margin-top: 0.35rem;
        letter-spacing: 0.04em;
      }

      @media screen and (max-width: 48em) {
        .home-hero { padding: 2rem 1rem; }
        .home-hero h1 { font-size: 1.5rem; }
        .home-tagline { font-size: 0.9rem; }
      }
    </style>

    <section class="home-hero">
      <h1>📘 2026 国考知识库</h1>
      <p class="home-tagline">系统备考 · 按需查阅 · 渐进深入</p>
    </section>
  {% endif %}
{% endblock %}

{% block content %}
  {% if page.is_home %}
    <div class="md-content" style="max-width: 768px; margin: 0 auto; padding: 0 1.25rem;">
      {{ page.content }}
    </div>
  {% else %}
    {{ super() }}
    <script>
      // 移动端浮动目录按钮
      (function() {
        var fab = document.createElement('div');
        fab.className = 'toc-fab';
        fab.innerHTML = '☰';
        fab.setAttribute('aria-label', '目录');
        fab.onclick = function() {
          var toc = document.querySelector('.md-sidebar--secondary');
          if (toc) toc.classList.toggle('md-sidebar--open');
        };
        document.body.appendChild(fab);
      })();
    </script>
  {% endif %}
{% endblock %}
