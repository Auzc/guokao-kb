{% extends "base.html" %}

{% block tabs %}
  {{ super() }}
  {% if page.is_home %}
    <style>
      .md-sidebar--primary { display: none; }
      .md-sidebar--secondary { display: none; }
      .md-content { max-width: 100%; margin: 0; padding: 0; }
      .md-main { min-height: auto; }

      .home-hero {
        text-align: center;
        padding: 3rem 1.5rem;
        background: linear-gradient(135deg, #1a237e 0%, #1565c0 100%);
        color: white;
        border-radius: 0 0 16px 16px;
        margin-bottom: 1.5rem;
      }
      .home-hero h1 {
        color: white;
        border-bottom: none;
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .home-hero p {
        font-size: 1.05rem;
        opacity: 0.85;
        margin-top: 0.5rem;
      }
      .home-stats {
        display: flex;
        justify-content: center;
        gap: 2rem;
        margin-top: 1.5rem;
      }
      .home-stat { text-align: center; }
      .home-stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: white;
        line-height: 1;
      }
      .home-stat-label {
        font-size: 0.8rem;
        opacity: 0.7;
        margin-top: 0.25rem;
      }

      @media screen and (max-width: 48em) {
        .home-hero { padding: 2rem 1rem; }
        .home-hero h1 { font-size: 1.5rem; }
        .home-hero p { font-size: 0.9rem; }
        .home-stats { gap: 1.5rem; }
        .home-stat-number { font-size: 1.6rem; }
        .home-stat-label { font-size: 0.7rem; }
      }
    </style>

    <section class="home-hero">
      <h1>📘 2026 国考知识库</h1>
      <p>行测 · 申论 · 真题 · 模考</p>
      <div class="home-stats">
        <div class="home-stat">
          <div class="home-stat-number">90+</div>
          <div class="home-stat-label">视频</div>
        </div>
        <div class="home-stat">
          <div class="home-stat-number">39</div>
          <div class="home-stat-label">文档</div>
        </div>
        <div class="home-stat">
          <div class="home-stat-number">10</div>
          <div class="home-stat-label">模块</div>
        </div>
      </div>
    </section>
  {% endif %}
{% endblock %}

{% block content %}
  {% if page.is_home %}
    <div class="md-content" style="max-width: 768px; margin: 0 auto; padding: 0 1.25rem;">
      {{ page.content }}
    </div>
  {% else %}
    {{ super() }}
    <script>
      // 移动端浮动目录按钮
      (function() {
        var fab = document.createElement('div');
        fab.className = 'toc-fab';
        fab.innerHTML = '☰';
        fab.setAttribute('aria-label', '目录');
        fab.onclick = function() {
          var toc = document.querySelector('.md-sidebar--secondary');
          if (toc) toc.classList.toggle('md-sidebar--open');
        };
        document.body.appendChild(fab);
      })();
    </script>
  {% endif %}
{% endblock %}
